# FHEM MQTT2 integration for the aquarium cooling controller.
#
# Firmware status on 2026-04-26:
# - MQTT telemetry is implemented
# - selected remote /set topics are implemented for target temperature,
#   air-assist enable, and minimum air-assist PWM
# - OTA maintenance-window control is exposed through MQTT
# - temperature payloads are rounded to one decimal place at the firmware
#   output boundary; internal control values remain full precision
#
# Topic root used here: aquarium_cooling
# This matches the verified local bench override in network_config.local.h.
# If your firmware uses the committed default root topic, replace
# "aquarium_cooling" with "aquarium/cooling" in this file.
#
# Optional broker gateway, if FHEM connects to an external broker.
# Skip this block if you already have an MQTT2_CLIENT or MQTT2_SERVER IODev.
#
# defmod MQTT2_BROKER MQTT2_CLIENT <broker-host>:1883
# attr MQTT2_BROKER room MQTT
# attr MQTT2_BROKER subscriptions aquarium_cooling/#
#
# If you use MQTT credentials, configure them on the MQTT2_BROKER device in
# FHEM according to your broker setup.

defmod AquariumCooling MQTT2_DEVICE aq-cooling-controller
attr AquariumCooling IODev MQTT2_BROKER
attr AquariumCooling alias Aquarium Cooling Controller
attr AquariumCooling room Aquarium
attr AquariumCooling group Kuehlung
attr AquariumCooling comment ESP32 aquarium cooling controller; local control remains authoritative while MQTT can adjust selected non-critical settings.
attr AquariumCooling event-on-change-reading .*
attr AquariumCooling stateFormat Wasser: water_temp_c C | Luft: air_temp_c C | Ziel: target_temp_c C | Luefter: fan_pwm_percent % | Alarm: alarm_code | MQTT: availability
attr AquariumCooling readingList aquarium_cooling/state/water_temp_c:.* water_temp_c\
aquarium_cooling/state/air_temp_c:.* air_temp_c\
aquarium_cooling/state/target_temp_c:.* target_temp_c\
aquarium_cooling/state/air_assist_enable:.* air_assist_enable\
aquarium_cooling/state/air_min_pwm_percent:.* air_min_pwm_percent\
aquarium_cooling/state/fan_pwm_percent:.* fan_pwm_percent\
aquarium_cooling/state/fan_rpm:.* fan_rpm\
aquarium_cooling/state/controller_mode:.* controller_mode\
aquarium_cooling/diagnostic/expected_rpm:.* expected_rpm\
aquarium_cooling/diagnostic/rpm_tolerance:.* rpm_tolerance\
aquarium_cooling/diagnostic/rpm_error:.* rpm_error\
aquarium_cooling/diagnostic/plausibility_active:.* plausibility_active\
aquarium_cooling/diagnostic/remote_config_accept_count:.* remote_config_accept_count\
aquarium_cooling/diagnostic/remote_config_reject_count:.* remote_config_reject_count\
aquarium_cooling/status/fan_plausible:.* fan_plausible\
aquarium_cooling/status/fan_fault:.* fan_fault\
aquarium_cooling/status/water_sensor_ok:.* water_sensor_ok\
aquarium_cooling/status/air_sensor_ok:.* air_sensor_ok\
aquarium_cooling/status/cooling_degraded:.* cooling_degraded\
aquarium_cooling/status/service_required:.* service_required\
aquarium_cooling/status/alarm_code:.* alarm_code\
aquarium_cooling/status/fault_severity:.* fault_severity\
aquarium_cooling/status/fault_response:.* fault_response\
aquarium_cooling/status/firmware_version:.* firmware_version\
aquarium_cooling/status/ota_state:.* ota_state\
aquarium_cooling/status/ota_message:.* ota_message\
aquarium_cooling/status/ota_window_active:.* ota_window_active\
aquarium_cooling/status/remote_config_last_result:.* remote_config_last_result\
aquarium_cooling/status/remote_config_last_key:.* remote_config_last_key\
aquarium_cooling/status/remote_config_last_detail:.* remote_config_last_detail\
aquarium_cooling/status/availability:.* availability

attr AquariumCooling setList target_temp_c:slider,15,0.1,35 aquarium_cooling/set/target_temp_c $EVTPART1\
air_assist_enable:true,false aquarium_cooling/set/air_assist_enable $EVTPART1\
air_min_pwm_percent:slider,0,1,45 aquarium_cooling/set/air_min_pwm_percent $EVTPART1\
ota_enable:true,false aquarium_cooling/set/ota_enable $EVTPART1
