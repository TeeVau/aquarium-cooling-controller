  <text class="small" x="720" y="374">100</text>

  <text class="label" x="360" y="408">PWM [%]</text>
  <text class="label" x="20" y="200" transform="rotate(-90 20 200)">RPM</text>

  <polyline class="up" points="149.2,303.97 182.2,281.85 215.2,263.38 248.2,242.92 281.2,222.71 314.2,209.72 347.2,193.17 380.2,178.4 413.2,161.66 446.2,145.17 479.2,132.12 512.2,121.08 545.2,104.53 578.2,91.54 611.2,78.74 644.2,67.66 677.2,58.31 710.2,47.38 730,41.82" />
  <polyline class="down" points="730,45.48 697,43.51 664,69.54 631,73.23 598,80.62 565,98.95 532,110.03 499,119.38 466,135.88 433,152.49 400,163.63 367,183.85 334,193.17 301,211.63 268,231.85 235,252.25 202,268.8 169,292.89 136,313.08 103,350 70,350" />

  <circle class="point-up" cx="149.2" cy="303.97" r="4.5" />
  <circle class="point-up" cx="314.2" cy="209.72" r="4.5" />
  <circle class="point-up" cx="479.2" cy="132.12" r="4.5" />
  <circle class="point-up" cx="644.2" cy="67.66" r="4.5" />
  <circle class="point-up" cx="730" cy="41.82" r="4.5" />

  <circle class="point-down" cx="730" cy="45.48" r="4.5" />
  <circle class="point-down" cx="565" cy="98.95" r="4.5" />
  <circle class="point-down" cx="400" cy="163.63" r="4.5" />
  <circle class="point-down" cx="235" cy="252.25" r="4.5" />
  <circle class="point-down" cx="70" cy="350" r="4.5" />

  <rect class="legend-box" x="760" y="130" width="76" height="146" rx="12" />
  <line class="up" x1="776" y1="162" x2="808" y2="162" />
  <text class="small" x="816" y="166">Up</text>
  <line class="down" x1="776" y1="194" x2="808" y2="194" />
  <text class="small" x="816" y="198">Down</text>
  <line class="marker" x1="776" y1="226" x2="808" y2="226" />
  <text class="small" x="816" y="230">Hold 10%</text>
  <line class="marker" x1="776" y1="258" x2="808" y2="258" />
  <text class="small" x="816" y="262">Start 12%</text>

  <text class="small" x="110" y="46">start PWM 12%</text>
  <text class="small" x="90" y="64">hold PWM 10%</text>
  <text class="small" x="638" y="34">max 1252 RPM</text>
</svg>
