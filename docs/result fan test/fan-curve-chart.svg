<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Noctua NF-S12A PWM fan curve</title>
  <desc id="desc">Measured PWM to RPM fan curve with upward and downward sweeps, plus start and hold PWM markers.</desc>
  <style>
    .bg { fill: #fcfbf7; }
    .panel { fill: #fffdfa; stroke: #d8d1c6; stroke-width: 1; }
    .grid { stroke: #e9e2d8; stroke-width: 1; }
    .axis { stroke: #4a4036; stroke-width: 2; }
    .label { fill: #3f352d; font-family: Arial, sans-serif; font-size: 14px; }
    .small { fill: #6b5e54; font-family: Arial, sans-serif; font-size: 12px; }
    .title { fill: #2d261f; font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .subtitle { fill: #6b5e54; font-family: Arial, sans-serif; font-size: 14px; }
    .up { fill: none; stroke: #0f766e; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .down { fill: none; stroke: #c2410c; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .marker { stroke: #7c6f64; stroke-width: 2; stroke-dasharray: 8 6; }
    .point-up { fill: #0f766e; }
    .point-down { fill: #c2410c; }
    .legend-box { fill: #fffdfa; stroke: #d8d1c6; stroke-width: 1; }
  </style>

  <rect class="bg" x="0" y="0" width="900" height="520" />
  <rect class="panel" x="40" y="30" width="820" height="450" rx="16" />

  <text class="title" x="70" y="72">Measured Fan Curve</text>
  <text class="subtitle" x="70" y="96">Noctua NF-S12A PWM, GPIO25 PWM, GPIO26 TACH, 3.3k pull-up on TACH</text>

  <line class="grid" x1="70" y1="350" x2="730" y2="350" />
  <line class="grid" x1="70" y1="300.77" x2="730" y2="300.77" />
  <line class="grid" x1="70" y1="251.54" x2="730" y2="251.54" />
  <line class="grid" x1="70" y1="202.31" x2="730" y2="202.31" />
  <line class="grid" x1="70" y1="153.08" x2="730" y2="153.08" />
  <line class="grid" x1="70" y1="103.85" x2="730" y2="103.85" />
  <line class="grid" x1="70" y1="54.62" x2="730" y2="54.62" />

  <line class="grid" x1="70" y1="30" x2="70" y2="350" />
  <line class="grid" x1="136" y1="30" x2="136" y2="350" />
  <line class="grid" x1="202" y1="30" x2="202" y2="350" />
  <line class="grid" x1="268" y1="30" x2="268" y2="350" />
  <line class="grid" x1="334" y1="30" x2="334" y2="350" />
  <line class="grid" x1="400" y1="30" x2="400" y2="350" />
  <line class="grid" x1="466" y1="30" x2="466" y2="350" />
  <line class="grid" x1="532" y1="30" x2="532" y2="350" />
  <line class="grid" x1="598" y1="30" x2="598" y2="350" />
  <line class="grid" x1="664" y1="30" x2="664" y2="350" />
  <line class="grid" x1="730" y1="30" x2="730" y2="350" />

  <line class="axis" x1="70" y1="350" x2="730" y2="350" />
  <line class="axis" x1="70" y1="30" x2="70" y2="350" />

  <line class="marker" x1="136" y1="30" x2="136" y2="350" />
  <line class="marker" x1="149.2" y1="30" x2="149.2" y2="350" />

  <text class="small" x="60" y="354">0</text>
  <text class="small" x="45" y="305">200</text>
  <text class="small" x="45" y="256">400</text>
  <text class="small" x="45" y="207">600</text>
  <text class="small" x="45" y="158">800</text>
  <text class="small" x="38" y="109">1000</text>
  <text class="small" x="38" y="60">1200</text>

  <text class="small" x="66" y="374">0</text>
  <text class="small" x="128" y="374">10</text>
  <text class="small" x="194" y="374">20</text>
  <text class="small" x="260" y="374">30</text>
  <text class="small" x="326" y="374">40</text>
  <text class="small" x="392" y="374">50</text>
